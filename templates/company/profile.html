<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/company/profile.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="logoModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);">
        <div style="max-width: 420px; margin: 10vh auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out;">
            <div style="background-color: #005f73; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; font-size: 1.25rem; font-weight: 600;">
                <i class="fas fa-camera" style="background-color: #005f73; margin-right: 8px;"></i> Update Company Logo
            </h3>
            <button type="button" onclick="closeLogoModal()" style="background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; opacity: 0.8;">&times;</button>
            </div>
            <div style="padding: 24px;">
                <form id="logoForm" action="{{ url_for('company.upload_company_logo') }}" method="POST" enctype="multipart/form-data">
                    <div style="margin-bottom: 24px; display: flex; justify-content: center;">
                        <img id="modalPreviewImage" src="{{ profile.logo if profile.logo else url_for('static', filename='images/company.jpg') }}" 
                            style="width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid #f3f4f6; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    </div>
                    <input type="file" name="company_logo" id="modalLogoInput" accept="image/png, image/jpeg, image/jpg, image/gif" style="width: 100%;  border: 1px solid grey;" class="form-control mb-2" required>
                    <small style="color: #6c757d; display: block; text-align: left; margin-top: 8px;">
                    <i class="fas fa-info-circle"></i> Max size: 2MB. Allowed types: JPG, PNG, GIF.
                    </small>
                    <div style="margin-top: 32px; display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid #f3f4f6; padding-top: 20px;">
                        <button type="submit" class="btn btn-primary" style="background-color: #005f73; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                            <i class="fas fa-upload" style="margin-right: 6px;"></i> Upload
                        </button>
                        <button type="button" class="btn btn-outline-secondary" onclick="closeLogoModal()" style="padding: 8px 16px; background-color: transparent; border: 1px solid #6c757d; color: #6c757d; border-radius: 4px; cursor: pointer;">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="popup-message" class="popup"></div> <!-- Popup Message -->
    <header>
        <div class="menu-toggle">
            <i class="fas fa-bars"></i>
        </div>
        <div class="logo">
            <!--<img src="{{ profile.logo }}" height="35px" style="border-radius: 25%;" onerror="this.src='https:/cdn.pixabay.com/photo/2023/02/01/00/54/company-7759278_1280.png';">-->
            <img src="{{ profile.logo if profile.logo else url_for('static', filename='images/company.jpg') }}"
                height="35px" style="border-radius: 25%;"
                onerror="this.onerror=null; this.src='{{ url_for('static', filename='images/company.jpg') }}';">
            <h4>{{ profile.company_name }}</h4>
        </div>
        <div class="profile-settings">
            <div class="profile-dropdown">
                <button class="profile-icon-btn"><i class="fas fa-user-circle"></i></button>
                <div class="dropdown-content">
                    <a href="{{ url_for('company.company_profile') }}"
                        style="background: linear-gradient(90deg, #e3e8f8, #f9faff); transform: scale(1.05); font-weight: bold;">
                        <i class="fas fa-user"></i> Profile
                    </a>
                    <a href="{{ url_for('auth.logout') }}">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="navigation" id="side-navigation">
            <button onclick="window.location.href='/company/company_dashboard'"><i class="fas fa-home"></i> Dashboard</button>
            <button onclick="window.location.href='/company/company_jobposting'"><i class="fas fa-briefcase"></i> Job Posting</button>
            <button onclick="window.location.href='/company/company_notification'"><i class="fas fa-bell"></i> Notifications</button>
            <button onclick="window.location.href='/company/company_application_review'"><i class="fas fa-check-circle"></i> Application Review</button>
            <button onclick="window.location.href='/company/company_hiring_communication'"><i class="fas fa-comments"></i> Hiring Communication</button>
        </div>

        <div class="activity">
            <h2>Company Profile</h2>
            <div style="display: flex; justify-content: center; margin-bottom: 30px; margin-top: 10px;">
                <div style="position: relative; display: inline-block; cursor: pointer; transition: transform 0.2s;" 
                    onclick="openLogoModal()" 
                    onmouseover="this.style.transform='scale(1.05)'" 
                    onmouseout="this.style.transform='scale(1)'"
                    title="Click to update company logo">
                    
                    <img id="mainProfileLogo" src="{{ profile.logo if profile.logo else url_for('static', filename='images/company.jpg') }}" 
                        style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #ffffff; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);"
                        onerror="this.onerror=null; this.src='{{ url_for('static', filename='images/company.jpg') }}';">
                    
                    <div style="position: absolute; bottom: 5px; right: 5px; background: #005f73; color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); border: 2px solid white;">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
            </div>
            <form id="profile-form" class="profile-form" method="POST" action="{{ url_for('company.company_profile') }}" onsubmit="return validateForm()">
                {% if companies %}
                    <input type="hidden" id="logId" name="logId" value="{{ companies.id }}">

                    <div>
                        <label for="company-name"><p style="color: red; display: inline;">* </p>Company Name:</label>
                        <input type="text" id="company-name" name="company-name" value="{{ companies.company_name or '' }}" placeholder="Enter company name" required>
                    </div>
                    
                    <div>
                        <label for="contact-email"><p style="color: red; display: inline;">* </p>Contact Email:</label>
                        <input type="email" id="contact-email" name="contact-email" value="{{ companies.email or '' }}" placeholder="Enter email address" required>
                    </div>
                    
                    <div>
                        <label for="company-description">Company Description:</label>
                        <textarea id="company-description" name="company-description" maxlength="1000" placeholder="Maximum 1000 characters">{{ companies.description or '' }}</textarea>
                    </div>
                    
                    <div>
                        <label for="company-address">Address:</label>
                        <textarea id="company-address" name="company-address" maxlength="500" placeholder="Maximum 500 characters">{{ companies.address or '' }}</textarea>
                    </div>
                    
                    <div>
                        <label for="industry-type"><p style="color: red; display: inline;">* </p>Industry Type:</label>
                        <select id="industries" name="industries" required>
                            <option value="" disabled {% if not companies.industry %}selected{% endif %}>-- Select Industry --</option>
                            {% for industry in industries %}
                                <option value="{{ industry }}" {% if companies.industry == industry %}selected{% endif %}>{{ industry }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div>
                        <label for="company-website">Company Website:</label>
                        <input type="url" id="company-website" name="company-website" value="{{ companies.website or '' }}" placeholder="Enter company website">
                    </div>                    

                    <div class="form-submit">
                        <button type="submit">Update Profile</button>
                    </div>

                {% else %}
                    <p>No company profile found.</p>
                {% endif %}
            </form>
        </div>
    </main>
    <script>
        const profileForm = document.getElementById('profile-form');
        const profileFormFields = [
            'company-name', 'contact-email', 'company-description', 'company-address',
            'industries', 'company-website'
        ];

        function saveProfileToSession() {
            const formData = {};
            profileFormFields.forEach(fieldId => {
                const element = document.getElementById(fieldId);
                if (element) {
                    formData[fieldId] = element.value;
                }
            });
            sessionStorage.setItem('companyProfileFormData', JSON.stringify(formData));
        }

        function loadProfileFromSession() {
            const savedData = sessionStorage.getItem('companyProfileFormData');
            if (savedData) {
                const formData = JSON.parse(savedData);
                profileFormFields.forEach(fieldId => {
                    const element = document.getElementById(fieldId);
                    // Only load data if the field is empty to avoid overwriting db values
                    if (element && !element.value && formData[fieldId]) {
                        element.value = formData[fieldId];
                    }
                });
            }
        }

        function clearProfileSessionData() {
            sessionStorage.removeItem('companyProfileFormData');
        }

        // Add event listeners to save data on input
        profileFormFields.forEach(fieldId => {
            const element = document.getElementById(fieldId);
            if (element) {
                element.addEventListener('input', saveProfileToSession);
            }
        });

        // Load data when the page loads
        // Unlike the 'new job' form, it's safe to always try loading here
        // because the fields are already pre-populated by the server.
        // Our script only fills empty fields.
        loadProfileFromSession();

        let initialFormData = {};

        window.onload = function() {
            // Store initial form values
            initialFormData = {
                "company-name": document.getElementById("company-name").value.trim(),
                "contact-email": document.getElementById("contact-email").value.trim(),
                "company-description": document.getElementById("company-description").value.trim(),
                "company-address": document.getElementById("company-address").value.trim(),
                "company-website": document.getElementById("company-website").value.trim(),
                "industries": document.getElementById("industries").value.trim()
            };
        };

        function showPopup(message, type) {
            if (!message) return; // Don't show popup if message is empty
            var popup = document.getElementById("popup-message");
            popup.innerHTML = message;
            popup.className = "popup " + type;
            popup.style.display = "block";
            setTimeout(() => { popup.style.display = "none"; }, 3000);
        }

        function validateEmailStrict(value) {
            // Same pattern as backend
            return /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(value);
        }

        function isDangerousUrl(url) {
            return /^(javascript:|data:)/i.test(url);
        }

        function hasMultipleUrls(url) {
            return /\s/.test(url);
        }

        function isHttpUrl(url) {
            return /^https?:\/\//i.test(url);
        }

        function containsScript(value) {
            return /<\s*script[\s\S]*?>[\s\S]*?<\s*\/\s*script\s*>/i.test(value);
        }

        function containsDangerousProtocols(value) {
            return /(javascript\s*:|data\s*:)/i.test(value);
        }

        function validateForm() {
            let changed = false;

            let currentFormData = {
                "company-name": document.getElementById("company-name").value.trim(),
                "contact-email": document.getElementById("contact-email").value.trim(),
                "company-description": document.getElementById("company-description").value.trim(),
                "company-address": document.getElementById("company-address").value.trim(),
                "company-website": document.getElementById("company-website").value.trim(),
                "industries": document.getElementById("industries").value.trim()
            };

            const name = currentFormData["company-name"];
            const desc = currentFormData["company-description"];
            const addr = currentFormData["company-address"];

            if (containsScript(name) || containsDangerousProtocols(name) || containsScript(desc) || containsScript(addr) || containsDangerousProtocols(desc) || containsDangerousProtocols(addr)) {
                showPopup("Dangerous content is not allowed in Company Name, Description or Address.", "error");
                return false;
            }

            for (let key in currentFormData) {
                if (currentFormData[key] !== initialFormData[key]) {
                    changed = true;
                    break;
                }
            }

            if (!changed) {
                // Front-end feedback for unchanged submit
                showPopup("No changes detected.", "info");
                return false; // Prevent form submission if no changes
            }

            // ---------------- Front-end validation ----------------
            
            if (currentFormData["company-name"].length < 3 || currentFormData["company-name"].length > 100) {
                showPopup("Company Name must be between 3-100 characters!", "error");
                return false;
            }

            if (!validateEmailStrict(currentFormData["contact-email"])) {
                showPopup("Invalid email format!", "error");
                return false;
            }

            if (!currentFormData["industries"]) {
                showPopup("Please select an industry type!", "error");
                return false;
            }

            const website = currentFormData["company-website"];
            if (website) {
                if (hasMultipleUrls(website)) {
                    showPopup("Please enter only one website URL.", "error");
                    return false;
                }
                if (!isHttpUrl(website)) {
                    showPopup("Website URL must start with http:// or https://.", "error");
                    return false;
                }
                if (isDangerousUrl(website)) {
                    showPopup("Website URL scheme is not allowed.", "error");
                    return false;
                }
            }

            if (currentFormData["company-description"].length > 1000) {
                showPopup("Description must be under 1000 characters!", "error");
                return false;
            }
            if (currentFormData["company-address"].length > 500) {
                showPopup("Address must be under 500 characters!", "error");
                return false;
            }

            clearProfileSessionData();
            return true; // Allow form submission
        }

        {% if message and request.method == 'POST' %}
            showPopup("{{ message }}", "{{ message_type }}");
        {% endif %}

        // Menu toggle function
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.getElementById('side-navigation').classList.toggle('active');
            document.querySelector('.menu-toggle').classList.toggle('active');
        });

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const sideNav = document.getElementById('side-navigation');
            const menuToggle = document.querySelector('.menu-toggle');
            
            if (sideNav.classList.contains('active') && 
                !sideNav.contains(event.target) && 
                !menuToggle.contains(event.target)) {
                sideNav.classList.remove('active');
                menuToggle.classList.remove('active');
            }
        });

        window.addEventListener('click', function(event) {
            const dropdown = document.querySelector('.profile-dropdown');
            const dropdownBtn = document.querySelector('.profile-icon-btn');
            
            if (!dropdown.contains(event.target)) {
                const dropdownContent = document.querySelector('.dropdown-content');
                if (dropdownContent.style.display === 'block') {
                    dropdownContent.style.display = 'none';
                }
            }
        });
        
        // Toggle dropdown on click (alternative to hover)
        document.querySelector('.profile-icon-btn').addEventListener('click', function(event) {
            event.stopPropagation();
            const dropdownContent = document.querySelector('.dropdown-content');
            dropdownContent.style.display = dropdownContent.style.display === 'block' ? 'none' : 'block';
        });
        
        // --- COMPANY LOGO MODAL LOGIC ---
        function openLogoModal() {
            document.getElementById('logoModal').style.display = 'block';
        }

        function closeLogoModal() {
            document.getElementById('logoModal').style.display = 'none';
            document.getElementById('modalLogoInput').value = '';
            document.getElementById('modalPreviewImage').src = "{{ profile.logo if profile.logo else url_for('static', filename='images/company.jpg') }}";
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('logoModal');
            if (event.target === modal) {
                closeLogoModal();
            }
        });

        document.getElementById('modalLogoInput').addEventListener('change', function() {
            const file = this.files[0];
            const maxSize = 2 * 1024 * 1024; // 2MB
            
            if (file) {
                if (file.size > maxSize) {
                    showPopup("File size must not exceed 2MB", "error");
                    this.value = '';
                    return;
                }
                
                const allowedTypes = ['image/jpeg', 'image/png', 'image/jpg', 'image/gif'];
                if (!allowedTypes.includes(file.type)) {
                    showPopup("Please select a valid image (JPG, PNG, GIF)", "error");
                    this.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('modalPreviewImage').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
