<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/college/profile.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="popup-message" class="popup"></div> <!-- Popup Message -->
    <header>
        <div class="menu-toggle">
            <i class="fas fa-bars"></i>
        </div>
        <div class="logo">
            <!--<img src="{{ profile.logo }}" height="35px" style="border-radius: 25%;" onerror="this.src='https:/cdn.pixabay.com/photo/2023/02/01/00/54/company-7759278_1280.png';">-->
            <img src="{{ profile.logo if profile.logo else url_for('static', filename='images/college.jpg') }}"
                height="35px" style="border-radius: 25%;"
                onerror="this.onerror=null; this.src='{{ url_for('static', filename='images/college.jpg') }}';">
            <h4>{{ profile.college_name }}</h4>
        </div>
        <div class="profile-settings">
            <div class="profile-dropdown">
                <button class="profile-icon-btn"><i class="fas fa-user-circle"></i></button>
                <div class="dropdown-content">
                    <a href="{{ url_for('college.college_profile') }}"
                        style="background: linear-gradient(90deg, #e3e8f8, #f9faff); transform: scale(1.05); font-weight: bold;">
                        <i class="fas fa-user"></i> Profile
                    </a>
                    <a href="{{ url_for('auth.logout') }}">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="navigation" id="side-navigation">
            <button onclick="window.location.href='/college/college_dashboard'"><i class="fas fa-home"></i> Dashboard</button>
            <button onclick="window.location.href='/college/college_studenttracking'"><i class="fas fa-user-graduate"></i> Student Tracking</button>
            <button onclick="window.location.href='/college/college_endorsement'"><i class="fas fa-certificate"></i> Endorsement</button>
            <button onclick="window.location.href='/college/generate_coupon'"><i class="fas fa-ticket-alt"></i> Coupon Management</button>
            <button onclick="window.location.href='/college/college_collab'"><i class="fas fa-handshake"></i> Collaboration Reports</button>
        </div>

        <div class="activity">
            <h2>College Profile</h2>
            <div style="display: flex; justify-content: center; margin-bottom: 30px; margin-top: 10px;">
                <div style="position: relative; display: inline-block; cursor: pointer; transition: transform 0.2s;" 
                    onclick="openLogoModal()" 
                    onmouseover="this.style.transform='scale(1.05)'" 
                    onmouseout="this.style.transform='scale(1)'"
                    title="Click to update college logo">
                    
                    <img id="mainProfileLogo" src="{{ profile.logo if profile.logo else url_for('static', filename='images/college.jpg') }}" 
                        style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #ffffff; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);"
                        onerror="this.onerror=null; this.src='{{ url_for('static', filename='images/college.jpg') }}';">
                    
                    <div style="position: absolute; bottom: 5px; right: 5px; background: #005f73; color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); border: 2px solid white;">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
            </div>
            <form id="profile-form" class="profile-form" method="POST" action="{{ url_for('college.college_profile') }}" onsubmit="return validateForm()">
                {% if colleges %}
                    <input type="hidden" id="logId" name="logId" value="{{ colleges.id }}">

                    <div>
                        <label for="college-name"><p style="color: red; display: inline;">* </p>College Name:</label>
                        <input type="text" id="college-name" name="college-name" value="{{ colleges.college_name or '' }}" placeholder="Enter college name" required>
                    </div>
                    
                    <div>
                        <label for="contact-email"><p style="color: red; display: inline;">* </p>Contact Email:</label>
                        <input type="email" id="contact-email" name="contact-email" value="{{ colleges.email or '' }}" placeholder="Enter email address" required>
                    </div>
                    
                    <div>
                        <label for="college-description">College Description:</label>
                        <textarea id="college-description" name="college-description" maxlength="1000" placeholder="Maximum 1000 characters">{{ colleges.description or '' }}</textarea>
                    </div>
                    
                    <div>
                        <label for="college-address">Address:</label>
                        <textarea id="college-address" name="college-address" maxlength="500" placeholder="Maximum 500 characters">{{ colleges.address or '' }}</textarea>
                    </div>
                    
                    <div>
                        <label for="college-website">College Website:</label>
                        <input type="url" id="college-website" name="college-website" value="{{ colleges.website or '' }}" placeholder="Enter college website">
                    </div>                    

                    <div class="form-submit">
                        <button type="submit">Update Profile</button>
                    </div>

                {% else %}
                    <p>No college profile found.</p>
                {% endif %}
            </form>
        </div>
    </main>

    <div id="logoModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);">
            <div style="max-width: 420px; margin: 10vh auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out;">
                <div style="background-color: #005f73; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-size: 1.25rem; font-weight: 600;">
                    <i class="fas fa-camera" style="margin-right: 8px;"></i> Update College Logo
                </h3>
                <button type="button" onclick="closeLogoModal()" style="background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; opacity: 0.8;">&times;</button>
                </div>
                <div style="padding: 24px;">
                    <form id="logoForm" action="{{ url_for('college.upload_college_logo') }}" method="POST" enctype="multipart/form-data">
                        <div style="margin-bottom: 24px; display: flex; justify-content: center;">
                        <img id="modalPreviewImage" src="{{ profile.logo if profile.logo else url_for('static', filename='images/college.jpg') }}" 
                            style="width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid #f3f4f6; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        </div>
                        <input type="file" name="college_logo" id="modalLogoInput" accept="image/png, image/jpeg, image/jpg, image/gif" style="width: 100%; border: 1px solid grey;" class="form-control mb-2" required>
                        <small style="color: #6c757d; display: block; text-align: left; margin-top: 8px;">
                        <i class="fas fa-info-circle"></i> Max size: 2MB. Allowed types: JPG, PNG, GIF.
                        </small>
                        <div style="margin-top: 32px; display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid #f3f4f6; padding-top: 20px;">
                        <button type="submit" class="btn btn-primary" style="background-color: #005f73; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                            <i class="fas fa-upload" style="margin-right: 6px;"></i> Upload image
                        </button>
                        <button type="button" class="btn btn-outline-secondary" onclick="closeLogoModal()" style="padding: 8px 16px; background-color: transparent; border: 1px solid #6c757d; color: #6c757d; border-radius: 4px; cursor: pointer;">
                            Cancel
                        </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    <script>
        const profileForm = document.getElementById('profile-form');
        const profileFormFields = [
            'college-name', 'contact-email', 'college-description', 'college-address',
            'college-website'
        ];
    
        // -------------------- SESSION STORAGE --------------------
        function saveProfileToSession() {
            const formData = {};
            profileFormFields.forEach(fieldId => {
                const element = document.getElementById(fieldId);
                if (element) formData[fieldId] = element.value;
            });
            sessionStorage.setItem('collegeProfileFormData', JSON.stringify(formData));
        }
    
        function loadProfileFromSession() {
            const savedData = sessionStorage.getItem('collegeProfileFormData');
            if (savedData) {
                const formData = JSON.parse(savedData);
                profileFormFields.forEach(fieldId => {
                    const element = document.getElementById(fieldId);
                    if (element && !element.value && formData[fieldId]) {
                        element.value = formData[fieldId];
                    }
                });
            }
        }
    
        function clearProfileSessionData() {
            sessionStorage.removeItem('collegeProfileFormData');
        }
    
        profileFormFields.forEach(fieldId => {
            const element = document.getElementById(fieldId);
            if (element) {
                element.addEventListener('input', saveProfileToSession);
            }
        });
    
        document.addEventListener('DOMContentLoaded', loadProfileFromSession);
    
        // -------------------- POPUP MESSAGE --------------------
        function showPopup(message, type) {
            if (!message) return;
            var popup = document.getElementById("popup-message");
            popup.innerHTML = message;
            popup.className = "popup " + type;
            popup.style.display = "block";
            setTimeout(() => { popup.style.display = "none"; }, 3000);
        }
    
        // -------------------- SAFETY HELPERS --------------------
        function validateEmailStrict(value) {
            return /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(value);
        }
        function containsScript(value) {
            return /<\s*script[\s\S]*?>[\s\S]*?<\s*\/\s*script\s*>/i.test(value);
        }
        function containsDangerousProtocols(value) {
            return /(javascript\s*:|data\s*:)/i.test(value);
        }
        function hasMultipleUrls(url) {
            return /\s/.test(url);
        }
        function isDangerousUrl(url) {
            return /^(javascript:|data:)/i.test(url);
        }
        function isHttpUrl(url) {
            return /^https?:\/\//i.test(url);
        }
    
        // -------------------- INITIAL FORM SNAPSHOT --------------------
        let initialFormData = {};
    
        window.onload = function() {
            initialFormData = {
                "college-name": document.getElementById("college-name").value.trim(),
                "contact-email": document.getElementById("contact-email").value.trim(),
                "college-description": document.getElementById("college-description").value.trim(),
                "college-address": document.getElementById("college-address").value.trim(),
                "college-website": document.getElementById("college-website").value.trim(),
            };
        };
    
        // -------------------- MAIN VALIDATION --------------------
        function validateForm() {
            let changed = false;
    
            let currentFormData = {
                "college-name": document.getElementById("college-name").value.trim(),
                "contact-email": document.getElementById("contact-email").value.trim(),
                "college-description": document.getElementById("college-description").value.trim(),
                "college-address": document.getElementById("college-address").value.trim(),
                "college-website": document.getElementById("college-website").value.trim(),
                "college-logo": document.getElementById("college-logo").value.trim()
            };
    
            // Detect changes
            for (let key in currentFormData) {
                if (currentFormData[key] !== initialFormData[key]) {
                    changed = true;
                    break;
                }
            }
    
            if (!changed) {
                showPopup("No changes detected.", "info");
                return false;
            }
    
            // -------------------- Security Checks --------------------
            const name = currentFormData["college-name"];
            const desc = currentFormData["college-description"];
            const addr = currentFormData["college-address"];
    
            if (containsScript(name) || containsScript(desc) || containsScript(addr) ||
                containsDangerousProtocols(name) || containsDangerousProtocols(desc) || containsDangerousProtocols(addr)) {
                showPopup("Dangerous content detected. Scripts or harmful URLs are not allowed.", "error");
                return false;
            }
    
            // -------------------- Field Rules --------------------
            if (name.length < 3 || name.length > 100) {
                showPopup("College Name must be between 3-100 characters!", "error");
                return false;
            }
    
            if (!validateEmailStrict(currentFormData["contact-email"])) {
                showPopup("Invalid email format!", "error");
                return false;
            }
    
            const website = currentFormData["college-website"];
            if (website) {
                if (hasMultipleUrls(website)) {
                    showPopup("Only one website URL is allowed.", "error");
                    return false;
                }
                if (!isHttpUrl(website)) {
                    showPopup("Website must start with http:// or https://.", "error");
                    return false;
                }
                if (isDangerousUrl(website)) {
                    showPopup("Dangerous URL protocol is not allowed.", "error");
                    return false;
                }
            }

    
            if (desc.length > 1000) {
                showPopup("Description must be under 1000 characters!", "error");
                return false;
            }
    
            if (addr.length > 500) {
                showPopup("Address must be under 500 characters!", "error");
                return false;
            }
    
            clearProfileSessionData();
            return true;
        }

        {% if message and request.method == 'POST' %}
            showPopup("{{ message }}", "{{ message_type }}");
        {% endif %}
    
        // -------------------- MENU TOGGLE (KEEPED) --------------------
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.getElementById('side-navigation').classList.toggle('active');
            document.querySelector('.menu-toggle').classList.toggle('active');
        });
    
        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const sideNav = document.getElementById('side-navigation');
            const menuToggle = document.querySelector('.menu-toggle');
    
            if (sideNav.classList.contains('active') &&
                !sideNav.contains(event.target) &&
                !menuToggle.contains(event.target)) {
                sideNav.classList.remove('active');
                menuToggle.classList.remove('active');
            }
        });
    
        // -------------------- DROPDOWN TOGGLE (KEEPED) --------------------
        window.addEventListener('click', function(event) {
            const dropdown = document.querySelector('.profile-dropdown');
            if (!dropdown.contains(event.target)) {
                const dropdownContent = document.querySelector('.dropdown-content');
                dropdownContent.style.display = 'none';
            }
        });
    
        document.querySelector('.profile-icon-btn').addEventListener('click', function(event) {
            event.stopPropagation();
            const dropdownContent = document.querySelector('.dropdown-content');
            dropdownContent.style.display =
                dropdownContent.style.display === 'block' ? 'none' : 'block';
        });
    
        // --- COLLEGE LOGO MODAL LOGIC ---
        function openLogoModal() {
            document.getElementById('logoModal').style.display = 'block';
        }

        function closeLogoModal() {
            document.getElementById('logoModal').style.display = 'none';
            document.getElementById('modalLogoInput').value = '';
            document.getElementById('modalPreviewImage').src = "{{ profile.logo if profile.logo else url_for('static', filename='images/college.jpg') }}";
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('logoModal');
            if (event.target === modal) {
                closeLogoModal();
            }
        });

        document.getElementById('modalLogoInput').addEventListener('change', function() {
            const file = this.files[0];
            const maxSize = 2 * 1024 * 1024; // 2MB
            
            if (file) {
                if (file.size > maxSize) {
                    showPopup("File size must not exceed 2MB", "error");
                    this.value = '';
                    return;
                }
                
                const allowedTypes = ['image/jpeg', 'image/png', 'image/jpg', 'image/gif'];
                if (!allowedTypes.includes(file.type)) {
                    showPopup("Please select a valid image (JPG, PNG, GIF)", "error");
                    this.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('modalPreviewImage').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
    </script>
    
</body>
</html>
